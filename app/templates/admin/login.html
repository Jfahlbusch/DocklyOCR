{% extends "base.html" %}
{% block title %}DocklyOCR — Sign in{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="w-full max-w-[400px]">
    <div class="text-center mb-6">
      <div class="text-xl font-semibold text-slate-900">DocklyOCR</div>
      <div class="text-sm text-slate-500 mt-1">Operator Console</div>
    </div>

    <div class="bg-white border border-slate-200 rounded-md shadow-sm p-6">
      {% if error %}
      <div class="border-l-4 border-rose-500 bg-rose-50 text-rose-800 text-sm p-3 rounded-md mb-4">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/admin/login" class="space-y-4">
        <div>
          <label for="username" class="block text-xs uppercase tracking-wide text-slate-500 mb-1">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            required
            class="w-full border border-slate-200 rounded-md px-3 py-2 text-sm text-slate-900 focus:outline-none focus:border-indigo-600">
        </div>
        <div>
          <label for="password" class="block text-xs uppercase tracking-wide text-slate-500 mb-1">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
            class="w-full border border-slate-200 rounded-md px-3 py-2 text-sm text-slate-900 focus:outline-none focus:border-indigo-600">
        </div>
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-md">
          Sign in
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
