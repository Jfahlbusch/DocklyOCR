<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DocklyOCR Admin{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .tnum { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  {% if request.session.get("admin_user") %}
  <nav class="bg-white border-b border-slate-200">
    <div class="max-w-[1280px] mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-8">
        <a href="/admin" class="font-semibold text-slate-900">DocklyOCR</a>
        <div class="flex items-center gap-6 text-sm">
          <a href="/admin" class="text-slate-600 hover:text-slate-900">Dashboard</a>
          <a href="/admin/customers" class="text-slate-600 hover:text-slate-900">Customers</a>
          <a href="/admin/jobs" class="text-slate-600 hover:text-slate-900">Jobs</a>
        </div>
      </div>
      <form method="post" action="/admin/logout">
        <button type="submit" class="text-sm text-slate-600 hover:text-slate-900">Logout</button>
      </form>
    </div>
  </nav>
  {% endif %}

  <main class="max-w-[1280px] mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <div id="modal-slot"></div>
</body>
</html>
